context: ""
rules: {}

# NOTE: the committed binary asset dir (assets/, claimed by hologlyph.asset.loader)
# surfaces an advisory CAIRN_RECONCILE_LANGUAGE_UNKNOWN warning. 0.3.0's `targets:`
# override cannot express a non-code language (only rust/typescript/python/go) and
# matches per node id, so the warning is accepted and logged as upstream friction.

# Keep build output and deps out of TypeScript reconciliation (cairn 0.3.0).
# node_modules/.git/.DS_Store are ignored by default; dist is our Vite output.
ignore:
  - dist

# Language-aware acceptance battery (cairn 0.3.0, feat #340). Before 0.3.0 the
# accept gate was hardcoded to cargo and always failed on this bun/TypeScript
# repo. A top-level `gates:` list overrides that: each `command` is whitespace
# split into argv and run at the repo root with no shell (so no pipes, &&, or
# quoted spaces). Success is strictly exit 0. These mirror AGENTS.md "Build and
# test".
gates:
  - name: typecheck
    command: bunx tsc --noEmit
  - name: tests
    command: bunx vitest run
  - name: build
    command: bun run build
  - name: lint
    command: bun run lint
